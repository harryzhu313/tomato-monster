<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>番茄钟</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <img id="monster" class="monster" alt="" />
    <div class="phase-label" id="phase-label">准备开始</div>
    <div class="timer" id="timer">25:00</div>
    <div class="buttons">
      <button id="btn-primary" class="btn btn-primary">开始专注</button>
      <button id="btn-skip" class="btn btn-secondary" disabled>跳过</button>
      <button id="btn-reset" class="btn btn-ghost">重置</button>
    </div>
    <div class="quota" id="quota" title="双击重置今日配额（仅测试）">今日剩 3/3</div>

    <div class="bg-picker">
      <label for="theme-select">主题</label>
      <select id="theme-select">
        <option value="default">默认</option>
        <option value="monster">情绪小怪兽</option>
      </select>
    </div>

    <div class="bg-picker">
      <label for="bg-select">锁屏背景</label>
      <select id="bg-select">
        <option value="transparent">半透明（默认）</option>
        <option value="dawn">黎明</option>
        <option value="ocean">深海</option>
        <option value="dusk">暮色</option>
      </select>
    </div>

    <div class="bg-picker">
      <label for="auto-start">休息后自动开始</label>
      <input type="checkbox" id="auto-start" checked />
    </div>

    <div class="bg-picker">
      <label for="white-noise">休息白噪音</label>
      <input type="checkbox" id="white-noise" checked />
    </div>

    <div class="bg-picker">
      <label for="chime">结束提示音</label>
      <input type="checkbox" id="chime" checked />
    </div>

    <div class="hint" id="hint">按时停下来，比多做一轮重要。</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
