<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="deep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06283c"/>
      <stop offset="50%"  stop-color="#0e4a6e"/>
      <stop offset="100%" stop-color="#1e7a9a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="120%" r="75%">
      <stop offset="0%"   stop-color="#7acfe6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7acfe6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#deep)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
</svg>
