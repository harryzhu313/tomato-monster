<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0b0620"/>
      <stop offset="50%"  stop-color="#3a1a60"/>
      <stop offset="100%" stop-color="#8c3a80"/>
    </linearGradient>
    <radialGradient id="moon" cx="25%" cy="20%" r="12%">
      <stop offset="0%"   stop-color="#fff8e0" stop-opacity="0.95"/>
      <stop offset="70%"  stop-color="#d8c890" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d8c890" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#night)"/>
  <rect width="1920" height="1080" fill="url(#moon)"/>
  <circle cx="480" cy="216" r="40" fill="#fff8e0" opacity="0.9"/>
  <!-- 零星几点"星" -->
  <circle cx="300"  cy="120" r="1.6" fill="#ffffff" opacity="0.8"/>
  <circle cx="700"  cy="80"  r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="1100" cy="160" r="1.4" fill="#ffffff" opacity="0.6"/>
  <circle cx="1500" cy="90"  r="1.6" fill="#ffffff" opacity="0.8"/>
  <circle cx="1720" cy="200" r="1.2" fill="#ffffff" opacity="0.7"/>
</svg>
