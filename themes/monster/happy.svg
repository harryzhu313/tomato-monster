<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160">
  <defs>
    <filter id="rough-happy" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="4"/>
      <feDisplacementMap in="SourceGraphic" scale="3"/>
    </filter>
  </defs>

  <!-- 身体 + 手臂（应用粗糙 filter 模拟蜡笔毛绒边缘）-->
  <g filter="url(#rough-happy)">
    <!-- 左手：举起挥舞 -->
    <path d="M 25 60 Q 15 35 10 18 L 22 14 Q 28 35 35 58 Z"
          fill="#f5c842" stroke="#6e4a12" stroke-width="2" stroke-linejoin="round"/>
    <!-- 右手：下垂 -->
    <path d="M 108 72 Q 120 85 126 102 L 114 108 Q 108 92 100 80 Z"
          fill="#f5c842" stroke="#6e4a12" stroke-width="2" stroke-linejoin="round"/>

    <!-- 主体：方形身体 + 两只尖角 + 两条腿 -->
    <path d="M 28 52 L 40 26 L 48 50
             L 82 50 L 90 26 L 102 52
             L 102 118 L 88 118 L 88 148 L 78 148 L 78 118
             L 52 118 L 52 148 L 42 148 L 42 118
             L 28 118 Z"
          fill="#f5c842" stroke="#6e4a12" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- 身体内的毛发笔触 -->
    <g stroke="#c99a20" stroke-width="1.5" stroke-linecap="round" opacity="0.55" fill="none">
      <path d="M 40 60 L 38 80"/>
      <path d="M 50 70 L 48 92"/>
      <path d="M 90 65 L 92 85"/>
      <path d="M 80 100 L 82 115"/>
      <path d="M 55 105 L 53 115"/>
    </g>
  </g>

  <!-- 五官（不加 filter 保持清晰）-->
  <!-- 眯眯笑的眼睛 -->
  <path d="M 45 78 Q 54 70 63 78" stroke="#2a2520" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 74 78 Q 83 70 92 78" stroke="#2a2520" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- 大大的笑 -->
  <path d="M 54 102 Q 68 114 82 102" stroke="#2a2520" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
